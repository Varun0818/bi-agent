services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/db/demo_data:/app/db/demo_data
      - ./backend/chroma_store:/app/chroma_store

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
